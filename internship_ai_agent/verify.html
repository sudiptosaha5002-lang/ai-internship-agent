<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.469.0"></script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
    <link rel="alternate icon" type="image/png" href="/static/images/favicon.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - InternshipAgent</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(99, 102, 241, 0.05), transparent);
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .verify-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
            display: block;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .otp-input-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
        }

        .otp-input {
            width: 50px;
            height: 60px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            transition: all 0.3s ease;
        }

        .otp-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            transform: translateY(-2px);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .resend {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .resend a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
        }

        .resend a:hover {
            text-decoration: underline;
        }

        #error-msg {
            color: #ef4444;
            margin-bottom: 16px;
            font-size: 0.9rem;
            display: none;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="verify-card">
            <span class="logo">InternshipAgent</span>
            <h1>Verify Your Email</h1>
            <p>We've sent a 6-digit verification code to <br><strong id="user-email">...</strong>. Please enter it below.</p>
            
            <div id="error-msg"></div>

            <div class="otp-input-container">
                <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 1)">
                <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 2)">
                <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 3)">
                <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 4)">
                <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 5)">
                <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 6)">
            </div>

            <button class="btn" onclick="verifyOTP()" id="verify-btn">Verify Email</button>

            <div class="resend">
                Didn't receive a code? <a href="#" onclick="resendOTP()">Resend OTP</a>
            </div>
        </div>
    </div>

    <script>
        const email = localStorage.getItem('pending_verification_email');
        if (!email) {
            window.location.href = '/register';
        }
        document.getElementById('user-email').textContent = email;

        function moveToNext(el, nextIndex) {
            if (el.value.length === 1 && nextIndex < 6) {
                document.querySelectorAll('.otp-input')[nextIndex].focus();
            }
        }

        async function verifyOTP() {
            const inputs = document.querySelectorAll('.otp-input');
            const otp = Array.from(inputs).map(i => i.value).join('');
            
            if (otp.length !== 6) {
                showError("Please enter all 6 digits.");
                return;
            }

            const btn = document.getElementById('verify-btn');
            btn.classList.add('loading');
            btn.textContent = 'Verifying...';

            try {
                const res = await fetch('/api/auth/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('session_id', data.session_id);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.removeItem('pending_verification_email');
                    
                    window.location.href = '/dashboard';
                } else {
                    showError(data.error || "Verification failed.");
                }
            } catch (err) {
                showError("Connection error. Try again.");
            } finally {
                btn.classList.remove('loading');
                btn.textContent = 'Verify Email';
            }
        }

        async function resendOTP() {
            try {
                const res = await fetch('/api/auth/resend-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (res.ok) {
                    alert("A new OTP has been sent to your inbox!");
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("Failed to resend OTP.");
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        // Auto-focus first input
        window.onload = () => document.querySelectorAll('.otp-input')[0].focus();
    </script>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
