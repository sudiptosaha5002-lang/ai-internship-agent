<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <defs>
        <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00f0ff" />
            <stop offset="100%" stop-color="#10b981" />
        </linearGradient>
        <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <!-- Glowing rounded hexagon border -->
    <path d="M50 8 L88 30 L88 70 L50 92 L12 70 L12 30 Z" fill="none" stroke="url(#glow-grad)" stroke-width="5" stroke-linejoin="round" filter="url(#glow-filter)" />
    <!-- Core AI brain/node -->
    <circle cx="50" cy="50" r="16" fill="url(#glow-grad)" opacity="0.9" />
    <path d="M32 50 H68" stroke="#00f0ff" stroke-width="3" stroke-linecap="round" opacity="0.8" />
    <!-- Outer dashed orbit rings -->
    <circle cx="50" cy="50" r="27" fill="none" stroke="#10b981" stroke-dasharray="7,5" stroke-width="2" opacity="0.75" />
    <!-- Orbital Nodes -->
    <circle cx="77" cy="35" r="4.5" fill="#00f0ff" />
    <circle cx="23" cy="65" r="4.5" fill="#10b981" />
</svg>
