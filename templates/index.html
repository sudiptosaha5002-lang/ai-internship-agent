<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Internship Finder Agent</title>
    <meta name="description" content="Upload your resume and let AI find the perfect internships for you.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════
           CSS RESET & VARIABLES
           ═══════════════════════════════════════ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #06060f;
            --bg-secondary: #0d0d1f;
            --bg-card: rgba(18, 18, 45, 0.75);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --accent-1: #7c6aff;
            --accent-2: #00e4b8;
            --accent-3: #ff6b9d;
            --accent-4: #4da0ff;
            --text-primary: #eaeaf4;
            --text-secondary: #9999bb;
            --text-muted: #5e5e80;
            --user-bubble: linear-gradient(135deg, #7c6aff 0%, #5644d4 100%);
            --ai-bubble: rgba(25, 25, 55, 0.85);
            --success: #00e4b8;
            --warning: #ffb84d;
            --danger: #ff5c5c;
            --shadow-glow: 0 0 40px rgba(124, 106, 255, 0.12);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* ═══════════════════════════════════════
           ANIMATED BACKGROUND
           ═══════════════════════════════════════ */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124, 106, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 106, 255, 0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            z-index: 0;
            animation: orbFloat 25s ease-in-out infinite;
        }
        .bg-orb-1 { width: 450px; height: 450px; background: rgba(124, 106, 255, 0.25); top: -150px; left: -100px; }
        .bg-orb-2 { width: 350px; height: 350px; background: rgba(0, 228, 184, 0.15); bottom: -80px; right: -80px; animation-delay: -12s; }
        .bg-orb-3 { width: 300px; height: 300px; background: rgba(255, 107, 157, 0.1); top: 40%; left: 60%; animation-delay: -6s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -25px) scale(1.04); }
            66% { transform: translate(-20px, 15px) scale(0.96); }
        }

        /* ═══════════════════════════════════════
           LAYOUT
           ═══════════════════════════════════════ */
        .app {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 920px;
            margin: 0 auto;
        }

        /* ═══════════════════════════════════════
           HEADER
           ═══════════════════════════════════════ */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 24px;
            background: rgba(13, 13, 31, 0.88);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        .header-avatar {
            width: 42px; height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            display: grid; place-items: center;
            font-size: 21px;
            box-shadow: 0 4px 18px rgba(124, 106, 255, 0.3);
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 4px 18px rgba(124, 106, 255, 0.3); }
            50% { box-shadow: 0 4px 30px rgba(124, 106, 255, 0.5); }
        }

        .header-info h1 {
            font-size: 15px; font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .header-status {
            display: flex; align-items: center; gap: 5px;
            font-size: 11.5px; color: var(--text-secondary);
        }

        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--success); box-shadow: 0 0 8px var(--success);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

        /* ═══════════════════════════════════════
           CHAT AREA
           ═══════════════════════════════════════ */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(124, 106, 255, 0.25); border-radius: 10px; }

        /* ═══════════════════════════════════════
           WELCOME / UPLOAD HERO
           ═══════════════════════════════════════ */
        .welcome {
            text-align: center;
            padding: 30px 20px;
            animation: fadeUp 0.7s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-icon {
            width: 72px; height: 72px;
            border-radius: 22px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            display: grid; place-items: center;
            font-size: 36px;
            margin: 0 auto 18px;
            box-shadow: 0 8px 35px rgba(124, 106, 255, 0.3);
            animation: orbFloat 8s ease-in-out infinite;
        }

        .welcome h2 {
            font-size: 26px; font-weight: 900;
            background: linear-gradient(135deg, #fff, var(--accent-2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 6px;
        }

        .welcome p {
            font-size: 13.5px; color: var(--text-secondary);
            max-width: 420px; margin: 0 auto 24px; line-height: 1.65;
        }

        /* ── Drop Zone ── */
        .drop-zone {
            position: relative;
            width: 100%;
            max-width: 480px;
            margin: 0 auto 22px;
            padding: 36px 24px;
            border: 2px dashed rgba(124, 106, 255, 0.3);
            border-radius: var(--radius-lg);
            background: rgba(124, 106, 255, 0.04);
            cursor: pointer;
            transition: var(--transition);
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-1);
            background: rgba(124, 106, 255, 0.1);
            transform: scale(1.01);
            box-shadow: 0 0 40px rgba(124, 106, 255, 0.12);
        }

        .drop-zone-icon {
            font-size: 42px;
            margin-bottom: 12px;
            animation: bounce-slow 3s ease-in-out infinite;
        }

        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .drop-zone h3 {
            font-size: 16px; font-weight: 700; color: var(--text-primary);
            margin-bottom: 6px;
        }

        .drop-zone p {
            font-size: 12.5px; color: var(--text-muted); margin: 0;
        }

        .drop-zone .browse-link {
            color: var(--accent-1);
            text-decoration: underline;
            font-weight: 600;
        }

        .drop-zone input {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }

        /* ── File Selected State ── */
        .file-selected {
            display: none;
            align-items: center;
            gap: 12px;
            max-width: 480px;
            margin: 0 auto 16px;
            padding: 14px 18px;
            border-radius: var(--radius-md);
            background: rgba(0, 228, 184, 0.08);
            border: 1px solid rgba(0, 228, 184, 0.2);
            animation: fadeUp 0.3s ease;
        }

        .file-selected.visible { display: flex; }

        .file-icon { font-size: 28px; }

        .file-details { flex: 1; text-align: left; }
        .file-details .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
        .file-details .size { font-size: 11px; color: var(--text-muted); }

        .file-remove {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(255, 92, 92, 0.15);
            border: none;
            color: var(--danger);
            font-size: 14px;
            cursor: pointer;
            display: grid; place-items: center;
            transition: var(--transition);
        }
        .file-remove:hover { background: rgba(255, 92, 92, 0.3); }

        /* ── Analyze Button ── */
        .analyze-btn {
            display: none;
            max-width: 480px;
            width: 100%;
            margin: 0 auto 18px;
            padding: 14px 28px;
            border: none;
            border-radius: var(--radius-xl);
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: white;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.3px;
            box-shadow: 0 6px 25px rgba(124, 106, 255, 0.3);
        }

        .analyze-btn.visible { display: block; }

        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 35px rgba(124, 106, 255, 0.4);
        }

        .analyze-btn:active { transform: translateY(0); }

        .analyze-btn:disabled {
            opacity: 0.6; cursor: not-allowed; transform: none !important;
        }

        /* ── Quick Actions ── */
        .divider-text {
            font-size: 12px; color: var(--text-muted);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .quick-actions {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
        }

        .quick-btn {
            padding: 9px 16px;
            border-radius: var(--radius-xl);
            background: var(--bg-glass);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: 12.5px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            display: flex; align-items: center; gap: 5px;
        }

        .quick-btn:hover {
            background: rgba(124, 106, 255, 0.1);
            border-color: rgba(124, 106, 255, 0.3);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        /* ═══════════════════════════════════════
           MESSAGE BUBBLES
           ═══════════════════════════════════════ */
        .msg {
            display: flex; gap: 10px;
            margin-bottom: 18px;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 10px;
            display: grid; place-items: center;
            font-size: 15px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); box-shadow: 0 3px 12px rgba(124, 106, 255, 0.2); }
        .msg.user .msg-avatar { background: linear-gradient(135deg, var(--accent-3), #e44d6e); box-shadow: 0 3px 12px rgba(255, 107, 157, 0.2); }

        .msg-body {
            max-width: 78%;
            padding: 13px 17px;
            border-radius: var(--radius-lg);
            font-size: 13.5px;
            line-height: 1.7;
        }

        .msg.ai .msg-body {
            background: var(--ai-bubble);
            border: 1px solid var(--glass-border);
            border-top-left-radius: 4px;
            backdrop-filter: blur(10px);
        }

        .msg.user .msg-body {
            background: var(--user-bubble);
            border-top-right-radius: 4px;
            color: #fff;
            box-shadow: 0 4px 18px rgba(124, 106, 255, 0.2);
        }

        /* ═══════════════════════════════════════
           SKILL TAGS EXTRACTED
           ═══════════════════════════════════════ */
        .skills-extracted {
            display: flex; flex-wrap: wrap; gap: 6px;
            margin: 10px 0 4px;
        }

        .skill-pill {
            padding: 3px 11px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(124, 106, 255, 0.12);
            color: var(--accent-1);
            border: 1px solid rgba(124, 106, 255, 0.18);
        }

        /* ═══════════════════════════════════════
           INTERNSHIP CARDS
           ═══════════════════════════════════════ */
        .cards-wrap { display: flex; flex-direction: column; gap: 12px; margin-top: 14px; }

        .intern-card {
            background: rgba(16, 16, 42, 0.92);
            border: 1px solid rgba(124, 106, 255, 0.12);
            border-radius: var(--radius-md);
            padding: 18px;
            transition: var(--transition);
            animation: cardPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .intern-card:hover {
            border-color: rgba(124, 106, 255, 0.35);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .intern-card:nth-child(1) { animation-delay: 0.05s; }
        .intern-card:nth-child(2) { animation-delay: 0.13s; }
        .intern-card:nth-child(3) { animation-delay: 0.21s; }
        .intern-card:nth-child(4) { animation-delay: 0.29s; }
        .intern-card:nth-child(5) { animation-delay: 0.37s; }

        @keyframes cardPop {
            from { opacity: 0; transform: translateY(14px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }

        .card-logo {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-4));
            display: grid; place-items: center;
            font-size: 15px; font-weight: 800; color: #fff;
            flex-shrink: 0;
        }

        .card-title-group { flex: 1; }
        .card-title { font-size: 14.5px; font-weight: 700; }
        .card-company { font-size: 12.5px; color: var(--accent-2); font-weight: 500; }

        .badge {
            padding: 3px 10px; border-radius: 20px;
            font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
            flex-shrink: 0;
        }

        .badge-remote { background: rgba(0, 228, 184, 0.12); color: var(--success); }
        .badge-onsite { background: rgba(124, 106, 255, 0.12); color: var(--accent-1); }
        .badge-hybrid { background: rgba(255, 184, 77, 0.12); color: var(--warning); }

        .card-meta {
            display: flex; flex-wrap: wrap; gap: 14px;
            margin: 8px 0; font-size: 12px; color: var(--text-secondary);
        }
        .card-meta span { display: flex; align-items: center; gap: 4px; }

        .card-desc {
            font-size: 12px; color: var(--text-muted);
            margin-bottom: 8px; line-height: 1.5;
        }

        .card-skills { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0; }

        .card-foot {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 12px; padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        .card-deadline { font-size: 11px; color: var(--text-muted); }

        .apply-btn {
            padding: 7px 20px; border-radius: 20px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: #fff; font-size: 11.5px; font-weight: 700;
            text-decoration: none; border: none; cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase; letter-spacing: 0.4px;
        }
        .apply-btn:hover { transform: scale(1.06); box-shadow: 0 4px 20px rgba(124, 106, 255, 0.35); }

        /* ═══════════════════════════════════════
           TYPING INDICATOR
           ═══════════════════════════════════════ */
        .typing { display: none; gap: 10px; margin-bottom: 18px; animation: slideIn 0.3s ease; }
        .typing.visible { display: flex; }

        .typing-dots {
            display: flex; gap: 5px;
            padding: 13px 17px;
            background: var(--ai-bubble);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            border-top-left-radius: 4px;
            backdrop-filter: blur(10px);
        }

        .typing-dots span {
            width: 8px; height: 8px;
            border-radius: 50%; background: var(--accent-1);
            animation: dotBounce 1.4s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes dotBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* ═══════════════════════════════════════
           PROCESSING OVERLAY
           ═══════════════════════════════════════ */
        .processing-bar {
            display: none;
            align-items: center;
            gap: 12px;
            max-width: 480px;
            margin: 0 auto 18px;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            background: rgba(124, 106, 255, 0.06);
            border: 1px solid rgba(124, 106, 255, 0.15);
            animation: fadeUp 0.3s ease;
        }

        .processing-bar.visible { display: flex; }

        .spinner {
            width: 24px; height: 24px;
            border: 3px solid rgba(124, 106, 255, 0.2);
            border-top-color: var(--accent-1);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .processing-bar .label { font-size: 13px; color: var(--text-secondary); }
        .processing-bar .label strong { color: var(--text-primary); }

        /* ═══════════════════════════════════════
           INPUT AREA
           ═══════════════════════════════════════ */
        .input-area {
            padding: 14px 16px 22px;
            background: rgba(13, 13, 31, 0.92);
            backdrop-filter: blur(24px);
            border-top: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        .input-wrap {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.035);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 5px 5px 5px 16px;
            transition: var(--transition);
        }

        .input-wrap:focus-within {
            border-color: rgba(124, 106, 255, 0.35);
            box-shadow: 0 0 20px rgba(124, 106, 255, 0.08);
        }

        #chatInput {
            flex: 1;
            background: transparent; border: none; outline: none;
            color: var(--text-primary);
            font-size: 13.5px; font-family: 'Inter', sans-serif;
            padding: 8px 0;
        }
        #chatInput::placeholder { color: var(--text-muted); }

        .btn-upload-sm {
            width: 38px; height: 38px;
            border-radius: 50%; border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 17px; cursor: pointer;
            display: grid; place-items: center;
            transition: var(--transition);
        }
        .btn-upload-sm:hover { background: rgba(124, 106, 255, 0.12); color: var(--accent-1); }

        .btn-send {
            width: 40px; height: 40px;
            border-radius: 50%; border: none;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: #fff; font-size: 17px; cursor: pointer;
            display: grid; place-items: center;
            transition: var(--transition);
            box-shadow: 0 4px 14px rgba(124, 106, 255, 0.25);
        }
        .btn-send:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(124, 106, 255, 0.35); }
        .btn-send:active { transform: scale(0.95); }
        .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        #hiddenFileInput { display: none; }

        /* ═══════════════════════════════════════
           WELCOME DROPZONE
        ═══════════════════════════════════════ */
        .welcome-upload {
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 24px;
            margin: 24px auto 12px;
            max-width: 480px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }
        .welcome-upload:hover {
            border-color: var(--accent-1);
            background: rgba(124, 106, 255, 0.05);
            transform: translateY(-2px);
        }
        .welcome-upload-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .welcome-upload-title {
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .welcome-upload-sub {
            color: var(--text-muted);
            font-size: 13px;
        }
        label.btn-upload-sm {
            width: 38px; height: 38px;
            border-radius: 50%; border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 17px; cursor: pointer;
            display: grid; place-items: center;
            transition: var(--transition);
            flex-shrink: 0;
            user-select: none;
        }
        label.btn-upload-sm:hover { background: rgba(124, 106, 255, 0.12); color: var(--accent-1); }

        /* ═══════════════════════════════════════
           TOAST
           ═══════════════════════════════════════ */
        .toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(16px);
            padding: 10px 22px; border-radius: var(--radius-xl);
            background: rgba(255, 92, 92, 0.9);
            color: #fff; font-size: 12.5px; font-weight: 500;
            backdrop-filter: blur(10px);
            opacity: 0; transition: all 0.35s ease;
            z-index: 100; pointer-events: none;
        }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.ok { background: rgba(0, 228, 184, 0.9); }

        /* ═══════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════ */
        @media (max-width: 640px) {
            .msg-body { max-width: 88%; font-size: 13px; }
            .header { padding: 10px 14px; }
            .chat-area { padding: 16px 10px; }
            .welcome h2 { font-size: 21px; }
            .drop-zone { padding: 28px 18px; }
            .quick-btn { font-size: 11.5px; padding: 7px 12px; }
            .intern-card { padding: 14px; }
        /* ── Avatar Container ── */
        #avatar-container {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 260px;
            height: 350px;
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 25px rgba(124,106,255,0.3);
            border: 1px solid var(--glass-border);
            z-index: 1000;
            display: none;
            background: #000;
        }
        #avatar-video { width: 100%; height: 100%; }
        
        @media (max-width: 1000px) {
            #avatar-container {
                top: 80px; right: 10px; width: 140px; height: 190px;
            }
        }
    </style>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
</head>
<body>

    <div id="avatar-container">
        <div id="avatar-video"></div>
    </div>

    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="app">

        <!-- Header -->
        <header class="header">
            <div class="header-avatar">🤖</div>
            <div class="header-info">
                <h1>AI Internship Finder</h1>
                <div class="header-status">
                    <span class="status-dot"></span>
                    <span>Online — Ready to help</span>
                </div>
            </div>
            <button class="quick-btn" style="margin-left: auto; background: var(--user-bubble); color: white; border: none; padding: 10px 18px;" onclick="window.location.href='/mock-interview/'">🎤 Practice Mock Interview</button>
        </header>

        <!-- Chat -->
        <div class="chat-area" id="chatArea">

            <!-- Welcome + Upload Hero -->
            <div class="welcome" id="welcomeScreen">
                <div class="welcome-icon">🤖</div>
                <h2>AI Internship Finder</h2>
                <p>Search for internships, get AI-powered recommendations, or practice your interview skills!</p>

                <!-- Welcome Upload Zone -->
                <div class="welcome-upload" onclick="document.getElementById('hiddenFileInput').click()">
                    <div class="welcome-upload-icon">📄</div>
                    <div class="welcome-upload-title">Drop your Resume (PDF)</div>
                    <div class="welcome-upload-sub">We'll analyse your skills & find matching internships instantly</div>
                </div>

                <!-- Mock Interview Button -->
                <button class="analyze-btn" style="margin-top:12px;background:linear-gradient(135deg,#7c6aff,#6366f1);cursor:pointer;max-width:480px;margin-left:auto;margin-right:auto;" onclick="window.location.href='/mock-interview/'">
                    🎤 Start Mock Interview
                </button>

                <!-- Divider -->
                <div class="divider-text" style="margin-top:24px;">or search for internships</div>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="quickSend('Find me Python developer internships')">🐍 Python</button>
                    <button class="quick-btn" onclick="quickSend('Find frontend React internships')">⚛️ Frontend</button>
                    <button class="quick-btn" onclick="quickSend('Show ML and AI internships')">🧠 ML / AI</button>
                    <button class="quick-btn" onclick="quickSend('Find remote internships for full stack developer')">🌐 Remote</button>
                    <button class="quick-btn" onclick="quickSend('Find data science internships')">📊 Data Science</button>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div class="typing" id="typingEl">
                <div class="msg-avatar" style="background:linear-gradient(135deg,var(--accent-1),var(--accent-2));box-shadow:0 3px 12px rgba(124,106,255,0.2);">🤖</div>
                <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-wrap">
                <input type="text" id="chatInput" placeholder="Ask about internships, skills, locations..." autocomplete="off">
                <!-- Native label triggers file input reliably in all browsers -->
                <label for="hiddenFileInput" class="btn-upload-sm" title="Upload Resume (PDF)">📎
                    <input type="file" id="hiddenFileInput" accept=".pdf,application/pdf" style="display:none">
                </label>
                <button class="btn-send" id="sendBtn" onclick="sendChat()" title="Send">➤</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (() => {
        // ═══════════════════════════════════════
        // STATE
        // ═══════════════════════════════════════
        const SID = 'sess_' + Date.now();
        let busy = false;
        let selectedFile = null;
        let agoraClient = null;

        // ═══════════════════════════════════════
        // RESUME UPLOAD LOGIC
        // ═══════════════════════════════════════
        const hiddenFileInput = document.getElementById('hiddenFileInput');
        const welcomeUploadZone = document.querySelector('.welcome-upload');

        // Drag & drop for welcome zone
        if (welcomeUploadZone) {
            welcomeUploadZone.addEventListener('dragover', e => {
                e.preventDefault();
                welcomeUploadZone.style.borderColor = 'var(--accent-1)';
                welcomeUploadZone.style.background = 'rgba(124, 106, 255, 0.1)';
            });
            welcomeUploadZone.addEventListener('dragleave', e => {
                e.preventDefault();
                welcomeUploadZone.style.borderColor = '';
                welcomeUploadZone.style.background = '';
            });
            welcomeUploadZone.addEventListener('drop', e => {
                e.preventDefault();
                welcomeUploadZone.style.borderColor = '';
                welcomeUploadZone.style.background = '';
                const f = e.dataTransfer.files[0];
                if (f && (f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'))) {
                    // Manually assign to hidden input wouldn't trigger 'change', so we process directly
                    processResume(f);
                } else {
                    toast('Please drop a PDF file', 'error');
                }
            });
        }

        hiddenFileInput.addEventListener('change', () => {
            const f = hiddenFileInput.files && hiddenFileInput.files[0];
            if (f) processResume(f);
        });

        async function processResume(f) {
            selectedFile = f;
            hideWelcome();

            // Show an "uploading..." message in the chat
            addMsg(`📄 <strong>Resume uploaded:</strong> ${f.name}<br><em>Analysing your resume...</em>`, 'ai');
            setBusy(true);

            const form = new FormData();
            form.append('resume', f, f.name);

            try {
                const res = await fetch('/api/dashboard/analyze-resume', {
                    method: 'POST',
                    body: form
                });

                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(errText);
                }

                const data = await res.json();

                if (data.error) {
                    addMsg(`❌ Could not analyse resume: ${data.error}`, 'ai');
                    toast('Resume analysis failed', 'error');
                } else {
                    const skills = (data.skills || []).slice(0, 10).join(', ');
                    const role   = data.role || 'Software Engineer';
                    const count  = data.stats?.matchedInternships || 0;
                    const score  = data.stats?.avgMatchScore || 0;

                    // Post extraction summary card in the chat
                    addMsg(
                        `✅ <strong>Resume Analysed!</strong><br>` +
                        `🎯 <strong>Inferred Role:</strong> ${role}<br>` +
                        `🧠 <strong>Top Skills:</strong> ${skills}<br>` +
                        `📋 <strong>${count}</strong> internship matches found from the web (avg score <strong>${score}%</strong>)<br><br>` +
                        `Now asking the AI to find the best opportunities for your profile...`,
                        'ai'
                    );

                    // Now auto-trigger a chat search using the detected skills
                    const query = `Find internships for a ${role} who knows: ${skills}`;
                    chatInput.value = query;
                    await sendChat();
                }
            } catch (err) {
                console.error('[Upload]', err);
                addMsg(`❌ Resume upload failed. Check the server is running.`, 'ai');
                toast('Upload error — check console', 'error');
            } finally {
                setBusy(false);
                // Reset input so same file can be reselected
                hiddenFileInput.value = '';
            }
        }

        // ═══════════════════════════════════════
        // AVATAR LOGIC
        // ═══════════════════════════════════════
        async function initAvatarSession() {
            try {
                const res = await fetch('/api/avatar/session', { method: 'POST' });
                if (!res.ok) return;
                
                const sessionData = await res.json();
                if (!sessionData.app_id) return;

                agoraClient = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });
                
                agoraClient.on('user-published', async (user, mediaType) => {
                    await agoraClient.subscribe(user, mediaType);
                    if (mediaType === 'video') {
                        document.getElementById('avatar-container').style.display = 'block';
                        user.videoTrack.play('avatar-video');
                    }
                    if (mediaType === 'audio') {
                        user.audioTrack.play();
                    }
                });

                await agoraClient.join(sessionData.app_id, sessionData.channel, sessionData.token, sessionData.uid);
                console.log('Agora Avatar Client Joined!');
            } catch (err) {
                console.error('Failed to init avatar', err);
            }
        }
        
        function speak(text) {
            if (!agoraClient) return;
            // Clean markdown and JSON objects before speaking
            let cleanText = text.replace(/```[\s\S]*?```/g, 'I found some internships that match your profile. Check them out on the screen!');
            cleanText = cleanText.replace(/[\*#_```]/g, '');
            if (!cleanText.trim()) return;

            const message = {
                v: 2,
                type: "chat",
                mid: "msg-" + Date.now(),
                idx: 0,
                fin: true,
                pld: { text: cleanText }
            };
            agoraClient.sendStreamMessage(JSON.stringify(message), false).catch(e => console.error(e));
        }

        initAvatarSession();

        // DOM
        const chatArea       = document.getElementById('chatArea');
        const chatInput      = document.getElementById('chatInput');
        const sendBtn        = document.getElementById('sendBtn');
        const typingEl       = document.getElementById('typingEl');
        const welcomeScreen  = document.getElementById('welcomeScreen');
        const toastEl        = document.getElementById('toast');

        // ═══════════════════════════════════════
        // CHAT
        // ═══════════════════════════════════════
        chatInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
        });

        window.sendChat = async function() {
            const txt = chatInput.value.trim();
            if (!txt || busy) return;
            hideWelcome();
            addMsg(txt, 'user');
            chatInput.value = '';
            setBusy(true);

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: txt, session_id: SID })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    addMsg(data.response, 'ai');
                    speak(data.response);
                } else { addMsg('Something went wrong. Please try again! 😔', 'ai'); toast(data.error); }
            } catch {
                addMsg("Can't reach the server. Make sure it's running! 🔌", 'ai');
                toast('Connection failed');
            }

            setBusy(false);
        };

        window.quickSend = function(txt) {
            chatInput.value = txt;
            sendChat();
        };

        // ═══════════════════════════════════════
        // ADD MESSAGE
        // ═══════════════════════════════════════
        function addMsg(text, sender) {
            const div = document.createElement('div');
            div.className = 'msg ' + sender;

            const ava = document.createElement('div');
            ava.className = 'msg-avatar';
            ava.textContent = sender === 'ai' ? '🤖' : '👤';

            const body = document.createElement('div');
            body.className = 'msg-body';
            body.innerHTML = sender === 'ai' ? parseAI(text) : text;

            div.appendChild(ava);
            div.appendChild(body);
            chatArea.insertBefore(div, typingEl);
            scroll();
        }

        // ═══════════════════════════════════════
        // PARSE AI RESPONSE
        // ═══════════════════════════════════════
        function parseAI(text) {
            let out = text;

            // Parse internship_cards code blocks
            out = out.replace(/```internship_cards\s*([\s\S]*?)```/g, (_, json) => {
                try { return renderCards(JSON.parse(json.trim())); } catch { return _; }
            });

            // Parse json code blocks (fallback)
            out = out.replace(/```json\s*([\s\S]*?)```/g, (_, json) => {
                try {
                    const d = JSON.parse(json.trim());
                    if (Array.isArray(d) && d[0]?.title && d[0]?.company) return renderCards(d);
                } catch {}
                return _;
            });

            // Raw JSON array fallback (if LLM skipped backticks)
            try {
                const sIdx = out.indexOf('[');
                const eIdx = out.lastIndexOf(']');
                if (sIdx !== -1 && eIdx > sIdx) {
                    const possibleJson = out.substring(sIdx, eIdx + 1);
                    const parsed = JSON.parse(possibleJson);
                    if (Array.isArray(parsed) && parsed.length > 0 && parsed[0].title && parsed[0].company) {
                        out = out.substring(0, sIdx) + renderCards(parsed) + out.substring(eIdx + 1);
                    }
                }
            } catch (e) {}

            // Markdown-like
            out = out
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');

            return out;
        }

        // ═══════════════════════════════════════
        // RENDER INTERNSHIP CARDS
        // ═══════════════════════════════════════
        function renderCards(jobs) {
            let h = '<div class="cards-wrap">';
            jobs.forEach(j => {
                const bc = (j.type||'').toLowerCase().includes('remote') ? 'badge-remote'
                    : (j.type||'').toLowerCase().includes('hybrid') ? 'badge-hybrid' : 'badge-onsite';
                const init = (j.company||'CO').substring(0,2).toUpperCase();
                const tags = (j.skills||[]).map(s => `<span class="skill-pill">${s}</span>`).join('');
                const dl = j.deadline ? new Date(j.deadline).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';

                h += `<div class="intern-card">
                    <div class="card-top">
                        <div class="card-logo">${init}</div>
                        <div class="card-title-group">
                            <div class="card-title">${j.title||'Untitled'}</div>
                            <div class="card-company">${j.company||'Unknown'}</div>
                        </div>
                        <span class="badge ${bc}">${j.type||'On-site'}</span>
                    </div>
                    <div class="card-meta">
                        <span>📍 ${j.location||'India'}</span>
                        <span>⏱️ ${j.duration||'—'}</span>
                        <span>💰 ${j.stipend||'Undisclosed'}</span>
                    </div>
                    ${j.description ? `<div class="card-desc">${j.description}</div>` : ''}
                    <div class="card-skills">${tags}</div>
                    <div class="card-foot">
                        <span class="card-deadline">⏰ Deadline: ${dl}</span>
                        <a href="${j.apply_link||'#'}" target="_blank" class="apply-btn">Apply →</a>
                    </div>
                </div>`;
            });
            h += '</div>';
            return h;
        }

        // ═══════════════════════════════════════
        // HELPERS
        // ═══════════════════════════════════════
        function setBusy(v) {
            busy = v;
            sendBtn.disabled = v;
            typingEl.classList.toggle('visible', v);
            if (v) scroll();
        }

        function hideWelcome() {
            if (welcomeScreen) welcomeScreen.style.display = 'none';
        }

        function scroll() {
            requestAnimationFrame(() => { chatArea.scrollTop = chatArea.scrollHeight; });
        }

        function toast(msg, type) {
            toastEl.textContent = msg;
            toastEl.className = 'toast ' + (type === 'ok' ? 'ok' : '') + ' visible';
            setTimeout(() => toastEl.classList.remove('visible'), 3000);
        }
    })();
    </script>
</body>
</html>
